name: Publish Package
on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4

      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno task lint
      - name: Test
        run: deno task test
      - name: TypeCheck
        run: deno task check

      - name: Publish to npm
        run: deno task publish
